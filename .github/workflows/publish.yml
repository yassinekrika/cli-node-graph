name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write   # required for npm provenance

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      # ── Install root deps (CLI) ─────────────────────────────────────────────
      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      # ── Install visualization deps ─────────────────────────────────────────
      - name: Install visualization dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./visualization

      # ── Build CLI (TypeScript → dist/) ─────────────────────────────────────
      - name: Build CLI
        run: pnpm build

      # ── Build visualization app (Vite → visualization/dist/) ───────────────
      - name: Build visualization app
        run: pnpm build
        working-directory: ./visualization

      # ── Publish ────────────────────────────────────────────────────────────
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
